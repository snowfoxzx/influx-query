name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset_name: influx-query-linux-x86_64
            archive_ext: tar.gz
            binary_name: influx-query
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: influx-query-linux-aarch64
            archive_ext: tar.gz
            binary_name: influx-query
          - name: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: influx-query-macos-x86_64
            archive_ext: tar.gz
            binary_name: influx-query
          - name: macos-aarch64
            runner: macos-15
            target: aarch64-apple-darwin
            asset_name: influx-query-macos-aarch64
            archive_ext: tar.gz
            binary_name: influx-query
          - name: windows-x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            asset_name: influx-query-windows-x86_64
            archive_ext: zip
            binary_name: influx-query.exe
          - name: windows-aarch64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset_name: influx-query-windows-aarch64
            archive_ext: zip
            binary_name: influx-query.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          cp README.md dist/README.md
          tar -C dist -czf "${{ matrix.asset_name }}.${{ matrix.archive_ext }}" "${{ matrix.binary_name }}" README.md

      - name: Prepare archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Copy-Item "README.md" "dist/README.md"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}","dist/README.md" -DestinationPath "${{ matrix.asset_name }}.${{ matrix.archive_ext }}" -Force

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.${{ matrix.archive_ext }}

  publish:
    name: publish-release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist
          find release-artifacts -type f -maxdepth 2 -exec cp {} dist/ \;

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd dist
          sha256sum influx-query-* > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/influx-query-*
            dist/SHA256SUMS
